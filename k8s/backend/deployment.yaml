apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiere-backend
  namespace: default
  labels:
    app: lumiere-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lumiere-backend
  template:
    metadata:
      labels:
        app: lumiere-backend
    spec:
      containers:
        - name: backend
          image: lumiere-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://lumiere-redis:6379/0"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

