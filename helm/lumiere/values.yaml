# Global Configuration
global:
  namespace: default

# Redis Configuration
redis:
  image:
    repository: redis
    tag: 28d6c0c63d1d0879c3e187384f852d4830a37541
    pullPolicy: IfNotPresent

# Backend Service Configuration
backend:
  replicaCount: 2
  image:
    repository: lumiere-backend
    tag: 28d6c0c63d1d0879c3e187384f852d4830a37541
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  redisUrl: "redis://lumiere-redis:6379/0"

# Frontend Service Configuration
frontend:
  replicaCount: 1
  image:
    repository: lumiere-frontend
    tag: 28d6c0c63d1d0879c3e187384f852d4830a37541
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8501
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
  backendUrl: "http://lumiere-backend:8000"
