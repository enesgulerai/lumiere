apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiere-redis
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lumiere-redis
  template:
    metadata:
      labels:
        app: lumiere-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: lumiere-redis
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: lumiere-redis
