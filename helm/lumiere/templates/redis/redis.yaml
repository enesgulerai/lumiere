apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiere-redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lumiere-redis
  template:
    metadata:
      labels:
        app: lumiere-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: lumiere-redis
  namespace: default
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: lumiere-redis